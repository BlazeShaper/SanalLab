<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanal Lab - Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#a1a1aa",
                        backgroundDark: "#09090b",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #f8fafc;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease-in-out;
        }
        
        .input-glass {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .input-glass:focus {
            outline: none;
            border-color: #a1a1aa;
            box-shadow: 0 0 0 2px rgba(161, 161, 170, 0.2);
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
        }
    </style>
</head>
<body class="min-h-screen w-full relative flex items-center justify-center bg-grid">

    <div class="relative z-10 w-full max-w-md mx-auto px-6 py-12">
        <div class="glass-card rounded-3xl p-8 flex flex-col items-center shadow-2xl">
            <div class="w-16 h-16 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center mb-6 text-primary">
                <span class="material-symbols-outlined text-3xl">lock</span>
            </div>
            
            <h2 class="text-3xl font-bold text-white mb-2 text-center">Sanal Lab Girişi</h2>
            <p class="text-slate-400 font-medium text-center mb-8 text-sm">
                Lütfen yetkilendirilmiş bilgilerinizi giriniz.
            </p>
            
            {% if error %}
            <div class="w-full bg-red-500/10 border border-red-500/20 text-red-400 text-sm px-4 py-3 rounded-xl mb-6 flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">error</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="/sanal-lab-login" method="POST" class="w-full space-y-5">
                <div class="space-y-2">
                    <label for="username" class="text-sm font-medium text-slate-300 ml-1">Kullanıcı Adı</label>
                    <input type="text" id="username" name="username" class="input-glass w-full px-4 py-3 rounded-xl text-sm" placeholder="Kullanıcı adınız..." required>
                </div>
                
                <div class="space-y-2">
                    <label for="password" class="text-sm font-medium text-slate-300 ml-1">Şifre</label>
                    <input type="password" id="password" name="password" class="input-glass w-full px-4 py-3 rounded-xl text-sm" placeholder="Şifreniz..." required>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-primary/20 hover:bg-primary/30 text-white font-semibold py-3 px-4 rounded-xl border border-primary/30 transition-colors flex items-center justify-center gap-2">
                        <span>Giriş Yap</span>
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
                    </button>
                </div>
            </form>
            
            <a href="/" class="mt-6 text-sm text-slate-500 hover:text-primary transition-colors inline-flex items-center gap-1">
                <span class="material-symbols-outlined text-xs">arrow_back</span> Ana Sayfaya Dön
            </a>
        </div>
    </div>

</body>
</html>
